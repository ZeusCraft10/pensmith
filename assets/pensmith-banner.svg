<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pensmith — academic writing with every citation verified">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="nib" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" rx="22" fill="url(#bg)"/>

  <!-- baseline rule, notebook feel -->
  <line x1="222" y1="150" x2="752" y2="150" stroke="#334155" stroke-width="1" opacity="0.55"/>

  <!-- pen nib -->
  <g transform="translate(74,52)">
    <path d="M40 0 L72 18 L56 86 L24 86 L8 18 Z" fill="url(#nib)"/>
    <circle cx="40" cy="34" r="6" fill="#0f172a"/>
    <rect x="38" y="42" width="4" height="34" rx="2" fill="#0f172a"/>
    <path d="M40 86 L33 106 L47 106 Z" fill="#6366f1"/>
  </g>

  <!-- verified badge on the nib -->
  <g transform="translate(120,118)">
    <circle cx="15" cy="15" r="15" fill="#22c55e" stroke="#0f172a" stroke-width="3"/>
    <path d="M8 15 l5 5 l9 -11" stroke="#0f172a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="222" y="96" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="60" font-weight="700" fill="#f8fafc" letter-spacing="-1.5">Pensmith</text>
  <text x="224" y="134" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="21" font-weight="500" fill="#94a3b8">Academic writing with every citation verified.</text>
</svg>
