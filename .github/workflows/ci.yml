name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20.18']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Verify macos runner is arm64 (Pitfall C)
        if: matrix.os == 'macos-latest'
        run: |
          echo "runner.arch=$RUNNER_ARCH"
          test "$RUNNER_ARCH" = "ARM64"
        shell: bash

      - run: npm ci

      # Generate the gitignored derived sources (bin/lib/version.generated.ts +
      # verbs.json) BEFORE lint/typecheck. They are produced by build's prebuild
      # hook, but lint + `tsc --noEmit` run before `npm run build` and import
      # version.generated.js — on a fresh checkout those files don't exist yet,
      # so typecheck fails with TS2307. (Local `npm run check` is green only
      # because the files persist on disk between builds.)
      - name: Generate derived sources (prebuild — version.generated.ts + verbs.json)
        run: npm run prebuild

      - run: npm run lint

      - run: npx tsc --noEmit

      - name: Build (produces dist/mcp/server.js for manifest validation)
        run: npm run build

      - name: Tier contract (Tier 1 ↔ Tier 2 equivalence — D-23 layer 1)
        run: npm run test:tier-contract

      - name: Test suite + coverage gate (non-TTY stdin — CI-03)
        shell: bash
        run: npm run test:coverage < /dev/null

      - name: Validate plugin manifests
        run: node scripts/validate-plugin-manifest.cjs

      - name: Assert working tree is clean after build (stale-derived-file guard — CI-02)
        shell: bash
        run: |
          status=$(git status --porcelain)
          if [ -n "$status" ]; then
            echo "FAIL: build/prebuild produced untracked or modified files:"
            echo "$status"
            exit 1
          fi
          echo "OK: working tree is clean."
