name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20.18']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Verify macos runner is arm64 (Pitfall C)
        if: matrix.os == 'macos-latest'
        run: |
          echo "runner.arch=$RUNNER_ARCH"
          test "$RUNNER_ARCH" = "ARM64"
        shell: bash

      - run: npm ci

      - name: Generate sources (version.generated.ts, verbs.json)
        run: node scripts/prebuild.mjs

      - run: npm run lint

      - run: npx tsc --noEmit

      - name: Build (produces dist/mcp/server.js for manifest validation)
        run: npm run build

      - name: Tier contract (Tier 1 ↔ Tier 2 equivalence — D-23 layer 1)
        run: npm run test:tier-contract

      - run: npm test

      - name: Validate plugin manifests
        run: node scripts/validate-plugin-manifest.cjs
